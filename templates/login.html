<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 340px;
            padding: 30px;
            border-radius: 12px;
            background: white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #4f46e5;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #4338ca;
        }
    </style>
</head>

<body>

<div class="login-card">
    <h2> Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Enter username" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
